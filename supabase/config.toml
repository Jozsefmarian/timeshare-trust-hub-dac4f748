## 8C. `.env.example` létrehozása

A repo gyökerében hozz létre egy új fájlt `.env.example` névvel. Ez dokumentálja milyen változók kellenek, de nem tartalmaz éles értékeket.

**Fájl:** `.env.example`

**Teljes tartalom:**
```
# Supabase
