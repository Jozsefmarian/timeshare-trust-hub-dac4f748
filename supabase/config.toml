## 8B. `.gitignore` — `.env` hozzáadása

**Fájl:** `.gitignore`

Nyisd meg a fájlt és keresd meg ezt a sort:
```
*.local
```

Ez után közvetlenül add hozzá ezeket az új sorokat:
```
.env
.env.production
.env.local
```

